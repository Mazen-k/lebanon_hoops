name: lebanon_hoops
description: "Swish — basketball app for fans."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  http: ^1.6.0
  shared_preferences: ^2.5.3
  supabase_flutter: ^2.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/launcher_icons/swishLogo.png"
  adaptive_icon_background: "#FAF8FF"
  adaptive_icon_foreground: "assets/launcher_icons/swishLogo.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FAF8FF"
  image: assets/launcher_icons/swishLogo.png
  android_12:
    color: "#FAF8FF"
    image: assets/launcher_icons/swishLogo.png
  ios: true
  web: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/cards/
    - assets/images/pack_tiles/
    - assets/images/pack_shop/
    - assets/images/cards_hub/
    - assets/images/card_type/
    - assets/images/club_logo/
