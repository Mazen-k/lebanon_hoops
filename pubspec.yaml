name: lebanon_hoops
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  http: ^1.6.0
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/launcher_icons/icon-ios-1024x1024.png"
  adaptive_icon_background: "#FAF8FF"
  adaptive_icon_foreground: "assets/launcher_icons/icon-ios-1024x1024.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/cards/
    - assets/images/pack_tiles/
    - assets/images/pack_shop/
    - assets/images/cards_hub/
    - assets/images/card_type/
    - assets/images/club_logo/
